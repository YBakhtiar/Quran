<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>القرآن الكريم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vazirmatn/33.0.0/Vazirmatn-font-face.min.css">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet">

    <style>
        /* همین استایل‌های قبلی رو بذار اینجا */
        body {
            background-color: #0d1622;
            font-family: 'Vazirmatn', 'Vazir', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 20px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px;
            z-index: 1002;
        }

        .main-download-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(6px);
            color: #8da4be;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 13px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 12px;
            z-index: 1002;
        }

        .progress-tooltip {
            position: fixed;
            top: 65px;
            left: 20px;
            color: #8da4be;
            font-size: 11px;
            background: rgba(13,22,34,0.8);
            padding: 4px 8px;
            border-radius: 6px;
            display: none;
            z-index: 1002;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -220px;
            width: 190px;
            background: rgba(17,29,43,0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.1);
            height: 100vh;
            padding: 85px 0 20px 0;
            display: flex;
            flex-direction: column;
            transition: right 0.5s;
            z-index: 1001;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-title {
            color: #8da4be;
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        #juzList {
            overflow-y: auto;
            flex-grow: 1;
        }
        
        .sidebar button {
            display: block;
            width: 82%;
            margin: 6px auto;
            padding: 9px;
            background: rgba(255,255,255,0.05);
            color: #8da4be;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow-y: auto;
            width: 100%;
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
        }
        
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            background: transparent;
            color: #8da4be;
            padding: 0 8px;
            cursor: pointer;
            z-index: 100;
            border: none;
            font-size: 28px;
        }
        
        .right-btn { right: 0; }
        .left-btn { left: 0; }

        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(6px);
            color: #cfddec;
            border: 1px solid rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
        }

        @media screen and (max-width: 768px) {
            .quran-container { padding: 10px; }
            .page { max-width: 100%; width: 100%; }
            .nav-btn, .fullscreen-btn { display: none !important; }
        }
    </style>
</head>
<body>

    <button id="mainDownloadBtn" class="main-download-btn" onclick="startDownload()">📥 دانلود آفلاین</button>
    <div id="progressTooltip" class="progress-tooltip">در حال دانلود...</div>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        <div id="juzList"></div>
    </div>

    <div class="main-content" id="swipeArea">
        <button class="nav-btn right-btn" onclick="prevPage()">❮</button>
        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست" crossorigin="anonymous">
            <img id="leftPage" class="page" alt="صفحه چپ" crossorigin="anonymous">
        </div>
        <button class="nav-btn left-btn" onclick="nextPage()">❯</button>
        <button class="fullscreen-btn" onclick="toggleFullScreen()">⤢</button>
    </div>

    <script>
        const IMAGE_CACHE = 'quran-images-cache';
        const totalPages = 623;
        let currentPage = 1;

        // ثبت سرویس ورکر
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(console.log);
            });
        }

        // دانلود همه تصاویر
        async function startDownload() {
            if (!confirm('دانلود همه صفحات؟ (حدود ۷۰ مگابایت)')) return;
            
            const btn = document.getElementById('mainDownloadBtn');
            const progress = document.getElementById('progressTooltip');
            
            btn.style.display = 'none';
            progress.style.display = 'block';
            
            const cache = await caches.open(IMAGE_CACHE);
            let downloaded = 0;
            
            for (let i = 1; i <= totalPages; i++) {
                const pageNum = String(i).padStart(3, '0');
                const url = `images/Quran${pageNum}.jpg`;
                
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        await cache.put(url, response);
                        downloaded++;
                        progress.innerText = `دریافت: ${downloaded}/${totalPages}`;
                    }
                } catch (e) {
                    console.log('خطا در صفحه', i);
                }
            }
            
            progress.style.display = 'none';
            alert('دانلود کامل شد!');
            updatePages();
        }

        // حذف فایل‌ها
        async function deleteOffline() {
            if (!confirm('حذف فایل‌های آفلاین؟')) return;
            await caches.delete(IMAGE_CACHE);
            alert('حذف شد');
            updatePages();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // تبدیل به اعداد فارسی
        function toPersianNum(num) {
            return num.toString().replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
        }

        // ساخت دکمه‌های جزء
        const juzList = document.getElementById('juzList');
        for (let i = 1; i <= 30; i++) {
            const btn = document.createElement('button');
            btn.innerText = 'جزء ' + toPersianNum(i);
            btn.onclick = () => {
                let page = i === 30 ? 587 : 3 + ((i - 1) * 20);
                if (window.innerWidth > 768 && page % 2 === 0) page--;
                currentPage = page;
                updatePages();
                toggleSidebar();
            };
            juzList.appendChild(btn);
        }
        
        // دکمه حذف
        const delBtn = document.createElement('button');
        delBtn.innerText = '🗑 حذف فایل‌ها';
        delBtn.onclick = deleteOffline;
        delBtn.style.border = '1px dashed #c96a75';
        delBtn.style.color = '#c96a75';
        juzList.appendChild(delBtn);

        // به‌روزرسانی صفحات
        function updatePages() {
            const isMobile = window.innerWidth <= 768;
            let rightPage = currentPage;
            
            if (!isMobile && rightPage % 2 === 0) {
                rightPage--;
            }
            
            // صفحه راست
            document.getElementById('rightPage').src = `images/Quran${String(rightPage).padStart(3, '0')}.jpg`;
            
            if (!isMobile) {
                const leftPage = rightPage + 1;
                if (leftPage <= totalPages) {
                    document.getElementById('leftPage').src = `images/Quran${String(leftPage).padStart(3, '0')}.jpg`;
                    document.getElementById('leftPage').style.display = 'block';
                } else {
                    document.getElementById('leftPage').style.display = 'none';
                }
                currentPage = rightPage;
            } else {
                document.getElementById('leftPage').style.display = 'none';
            }
            
            localStorage.setItem('lastPage', currentPage);
        }

        function nextPage() {
            const step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage + step <= totalPages) {
                currentPage += step;
                updatePages();
            }
        }

        function prevPage() {
            const step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage - step >= 1) {
                currentPage -= step;
                updatePages();
            }
        }

        // صفحه کلید
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') nextPage();
            if (e.key === 'ArrowRight') prevPage();
        });

        // لود اولیه
        window.onload = () => {
            const saved = localStorage.getItem('lastPage');
            if (saved) currentPage = parseInt(saved);
            updatePages();
        };
    </script>
</body>
</html>
